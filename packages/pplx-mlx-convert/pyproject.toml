[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pplx-mlx-convert"
version = "0.1.0"
description = "Utilities for converting Perplexity embedding models into MLX format."
requires-python = ">=3.10"
dependencies = []

[project.scripts]
pplx-mlx-convert = "pplx_mlx_convert.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/pplx_mlx_convert"]
